services:
  career-forge:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      ENABLE_OLLAMA_REVIEW: "true"
      OLLAMA_BASE_URL: http://host.docker.internal:11434
